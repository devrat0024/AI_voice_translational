services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinical_scribe_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist SQLite databases and uploaded/output files locally
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: always
